aid: zoho-writer
name: Zoho Writer
description: >
  Zoho Writer is an online word processor with a REST API for creating, editing,
  merging, converting, and signing documents, and automating document workflows
  within the Zoho ecosystem. The API supports document CRUD operations, mail merge
  with templates, fillable forms, electronic signatures via Zoho Sign integration,
  webhook-triggered automation, and multi-format document export (PDF, DOCX, HTML).
  OAuth 2.0 authentication is used with domain-specific base URLs across global
  data centers.
